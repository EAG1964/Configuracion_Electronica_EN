function parseTokens(s){const str=normalizeConfig(s); const out=[]; const re=/(\d)([spdf])(\d{1,2})/gi; let m; while((m=re.exec(str))!==null) out.push(`${m[1]}${m[2].toLowerCase()}${Number(m[3])}`); return out}
function tokenMap(tokens){const map={}; tokens.forEach(t=>{const m=String(t).match(/^(\d[spdf])(\d{1,2})$/); if(m) map[m[1]]=(map[m[1]]||0)+Number(m[2])}); return map}
function mapsEqual(a,b){const keys=new Set([...Object.keys(a),...Object.keys(b)]); for(const k of keys){if((a[k]||0)!==(b[k]||0)) return false} return true}
function sameSeq(a,b){return a.length===b.length && a.every((x,i)=>x===b[i])}
function shellOrderTokens(tokens){return [...tokens].sort((a,b)=>{const ma=a.match(/^(\d)([spdf])(\d{1,2})$/), mb=b.match(/^(\d)([spdf])(\d{1,2})$/); if(!ma||!mb) return 0; const na=Number(ma[1]), nb=Number(mb[1]); if(na!==nb) return na-nb; return ORBITAL_ORDER[ma[2]]-ORBITAL_ORDER[mb[2]]})}
function formatElectronInput(input){let v=input.value; let start=input.selectionStart; v=v.replace(/([spdf])([0-9⁰¹²³⁴⁵⁶⁷⁸⁹]{1,2})/gi,(m,o,nums)=>o+nums.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g,ch=>REV_SUPER[ch]||ch).split('').map(d=>SUPER[d]||d).join('')); input.value=v; try{input.setSelectionRange(start,start)}catch(e){}}
function parseToken(t){const m=String(t).match(/^(\d)([spdf])(\d{1,2})$/); return m?{level:Number(m[1]),orbital:m[2],electrons:Number(m[3])}:null}
function finalToken(el){return el.fullTokens[el.fullTokens.length-1]}
function fullHTML(e){return tokensToHTML(e.fullTokens)}
function shellHTML(e){return tokensToHTML(shellOrderTokens(e.fullTokens))}
function shortHTML(e){return e.core ? `[${e.core}] ${tokensToHTML(e.shortTokens)}` : tokensToHTML(e.shortTokens)}
function scrollChat(){const box=$('chat'); if(!box) return; requestAnimationFrame(()=>box.scrollTop=box.scrollHeight); setTimeout(()=>box.scrollTop=box.scrollHeight,60)}
function scrollWork(){const w=$('work'); if(!w) return; requestAnimationFrame(()=>w.scrollTop=w.scrollHeight); setTimeout(()=>w.scrollTop=w.scrollHeight,60)}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function formatQuantumSymbolsInHTML(html){
  return String(html||'')
    .replace(/m\s*_\s*l/gi,'m<sub>l</sub>')
    .replace(/m\s*_\s*s/gi,'m<sub>s</sub>')
    .replace(/\bml\b/gi,'m<sub>l</sub>')
    .replace(/\bms\b/gi,'m<sub>s</sub>')
    .replace(/mₗ/g,'m<sub>l</sub>')
    .replace(/mₛ/g,'m<sub>s</sub>');
}
function formatQuantumSymbolsText(s){
  return formatQuantumSymbolsInHTML(escapeHtml(s));
}
function prettifyQuantumInputText(v){
  return String(v||'')
    .replace(/m\s*_\s*l/gi,'mₗ')
    .replace(/m\s*_\s*s/gi,'mₛ')
    .replace(/\bml\b/gi,'mₗ')
    .replace(/\bms\b/gi,'mₛ');
}
function attachQuantumSubscriptInputs(root=document){
  root.querySelectorAll('input,textarea').forEach(el=>{
    if(el.dataset.quantumSubscriptAttached) return;
    el.dataset.quantumSubscriptAttached='1';
    const handler=()=>{
      const start=el.selectionStart, end=el.selectionEnd;
      const old=el.value;
      const val=prettifyQuantumInputText(old);
      if(val!==old){
        el.value=val;
        try{
          const delta=val.length-old.length;
          el.setSelectionRange(Math.max(0,(start||0)+delta),Math.max(0,(end||0)+delta));
        }catch(e){}
      }
    };
    el.addEventListener('input',handler);
    el.addEventListener('blur',handler);
  });
}

// ---------------- ELECTRON CONFIGURATION ----------------
function openConfigModule(){showElementPicker()}
function renderConfigButtons(){setTopButtons(`${homeButton()}<button class="ghost" onclick="restartConfig()">Restart</button><button class="primary" onclick="startConfig(randomElement(),false)">Random without Z</button><button class="warn" onclick="startConfig(randomElement(),true)">Study with Z</button><button class="blue" onclick="showElementPicker()">All elements</button>`)}
function randomElement(){return ELEMENTS[Math.floor(Math.random()*ELEMENTS.length)]}
function startConfig(el,showZ){clearAll(); state.module='config'; state.el=el; state.showZ=showZ; state.step=0; renderConfigButtons(); renderConfigPrompt(); renderConfigStep(); addTutor('We are going to determine the electron configuration and some related features. First, we will identify the period, group and block.')}
function restartConfig(){if(state.el) startConfig(state.el,state.showZ); else startConfig(randomElement(),false)}
function renderConfigPrompt(){const e=state.el; setPrompt(`<div class="atom-badge"><div class="sym">${e.symbol}</div>${state.showZ?`<div class="z">Z = ${e.z}</div>`:''}</div><div class="prompt-main"><h3>${e.name}</h3><div class="chips"><span class="chip gray">Period</span><span class="chip gray">Group</span><span class="chip gray">Block</span>${e.isException?'<span class="chip warn">possible exception</span>':''}</div></div>`)}
function buildPeriodicPicker(){
  const groups=Array.from({length:18},(_,i)=>i+1);
  const periods=[1,2,3,4,5,6,7];
  const headers=groups.map(g=>`<div class="group-head">${g}</div>`).join('');
  const cells=[];
  periods.forEach(p=>{
    groups.forEach(g=>{
      const el=ELEMENTS.find(e=>e.period===p && String(e.groupId)===String(g));
      if(el){
        cells.push(`<button class="periodic-cell block-${el.block}" title="${el.z} · ${eSafe(el.name)} (${el.symbol})" onclick="startPickedElement('${el.symbol}')">${el.symbol}</button>`);
      }else{
        cells.push('<div class="periodic-empty"></div>');
      }
    });
  });
  return `<div class="periodic-picker-wrap"><div class="periodic-grid">${headers}${cells.join('')}</div></div>`;
}
function eSafe(s){return String(s).replace(/"/g,'&quot;')}
function startPickedElement(sym){const mode=$('pickMode')?$('pickMode').value:'noz'; startConfigBySymbol(sym, mode==='z')}
function showElementPicker(){
  state.module='config'; $('stageTitle').textContent='Choose element'; renderConfigButtons(); resetTutor();
  setPrompt('<h3>Select the element</h3><p class="small">Item bank organised as a simplified periodic table, ordered by groups 1 to 18.</p>','prompt-card home');
  const options=ELEMENTS.map(e=>`<option value="${e.symbol}">${e.z} · ${e.name} (${e.symbol})</option>`).join('');
  setWork(`<h3>All elements</h3>
    <div class="grid2">
      <div><label>Element</label><select id="pickEl">${options}</select></div>
      <div><label>Mode</label><select id="pickMode"><option value="noz">Without Z</option><option value="z">With Z</option></select></div>
    </div>
    <div class="btn-row" style="margin-top:8px"><button class="good" onclick="loadPickedElement()">Load selected element</button><button class="primary" onclick="startConfig(randomElement(),false)">Random without Z</button></div>
    <p class="small periodic-note"><b>Item bank:</b> you can also click directly on any symbol in the table.</p>
    ${buildPeriodicPicker()}`);
  addTutor('Choose an element from the dropdown or click its symbol in the periodic table. Then decide whether you want to practise with or without atomic number.');
}
function startConfigBySymbol(sym, showZ=false){const el=ELEMENTS.find(e=>e.symbol===sym); if(el) startConfig(el,showZ)}
function loadPickedElement(){const sym=$('pickEl').value; const el=ELEMENTS.find(e=>e.symbol===sym); const showZ=$('pickMode').value==='z'; startConfig(el,showZ)}
function renderConfigStep(){
  if(state.module!=='config') return;
  const hist=renderBoardHistory(); let step='';
  if(state.step===0) step=htmlPosition();
  else if(state.step===1) step=htmlEnding();
  else if(state.step===2) step=htmlFullConfig();
  else if(state.step===3) step=htmlShortConfig();
  else if(state.step===4) step=htmlValence();
  else if(state.step===5) step=htmlOrbitalDeployment();
  else if(state.step===6) step=htmlUnpaired();
  else step=htmlConfigReport();
  setWork(hist+`<div class="current-step">${step}</div>`);
}
function htmlPosition(){return `<h3>1. Place the element</h3><div class="grid3"><div><label>Period</label><input id="periodInput" type="number" min="1" max="7" step="1"></div><div><label>Group</label><input id="groupInput" type="number" min="1" max="18" step="1"></div><div><label>Block</label><select id="blockInput"><option value="">Select...</option><option value="s">s</option><option value="p">p</option><option value="d">d</option><option value="f">f</option></select></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkPosition()">Check position</button></div><div id="stepFeedback"></div>`}
function checkPosition(){const e=state.el; const pVal=$('periodInput').value, gVal=$('groupInput').value, b=$('blockInput').value; if(!pVal||!gVal||!b) return warnMissing(); const p=Number(pVal), g=Number(gVal); addUser(`Position: period ${p}, group ${g}, block ${b}.`); const wrong=[]; if(p!==e.period) wrong.push('period'); if(String(g)!==String(e.groupId)) wrong.push('group'); if(b!==e.block) wrong.push('block'); const solution=`period ${e.period} · group ${e.groupId} · block ${e.block}`; if(!wrong.length){addBoardResult('Correct position',solution); advanceConfig(1)} else handleWrong('position',positionHints(e,wrong),solution,'Position',1)}
function positionHints(e,wrong){const h=[]; if(wrong.includes('period')) h.push('the period is the main row; remember that the outer shell number usually matches that row in s/p blocks.'); if(wrong.includes('group')) h.push('the group is column 1–18. In the s and p blocks it guides the valence electrons, while in the d block it corresponds to the central transition area.'); if(wrong.includes('block')) h.push('the block is the characteristic subshell being filled: left s, right p, central area d.'); return [h.join(' '),'Review only the fields indicated by the previous hint; do not change what was already consistent.']}
function htmlEnding(){return `<h3>2. Deduce the electron configuration ending</h3><div class="grid3"><div><label>Final shell</label><input id="endLevel" type="number" min="1" max="7"></div><div><label>Final subshell</label><select id="endOrb"><option value="">Select...</option><option value="s">s</option><option value="p">p</option><option value="d">d</option><option value="f">f</option></select></div><div><label>Electrons in that subshell</label><input id="endElectrons" type="number" min="1" max="14"></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkEnding()">Check ending</button></div><div id="stepFeedback"></div>`}
function checkEnding(){const e=state.el, ft=parseToken(finalToken(e)); const lvlv=$('endLevel').value, orb=$('endOrb').value, nev=$('endElectrons').value; if(!lvlv||!orb||!nev) return warnMissing(); const level=Number(lvlv), ne=Number(nev); addUser(`Ending: ${level}${orb}${sup(ne)}.`); const wrong=[]; if(level!==ft.level) wrong.push('nivel'); if(orb!==ft.orbital) wrong.push('subshell'); if(ne!==ft.electrons) wrong.push('electrons'); const solution=tokenToHTML(finalToken(e)); if(!wrong.length){addBoardResult('Correct ending',solution); advanceConfig(2)} else handleWrong('ending',endingHints(e,wrong),solution,'Ending',2)}
function endingHints(e,wrong){const out=[]; if(wrong.includes('nivel')) out.push('if the block is d, the d subshell shell number is usually period − 1; if it is p or s, it usually matches the period.'); if(wrong.includes('subshell')) out.push('the final subshell letter must match the element block.'); if(wrong.includes('electrons')) out.push('count how many positions are advanced within the block, and watch for possible s/d exceptions.'); return [out.join(' '), e.isException?'This element is marked as a possible exception: check whether an s electron is promoted to the d subshell.':'The final exponent is not the whole group number: it is the number of electrons in that specific subshell.']}
function htmlFullConfig(){return `<h3>3. Write the electron configuration</h3><textarea id="configInput" oninput="formatElectronInput(this)"></textarea><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkFullConfig()">Check configuration</button></div><div id="stepFeedback"></div>`}
function checkFullConfig(){const e=state.el; const raw=$('configInput').value.trim(); if(!raw) return warnMissing(); const tokens=parseTokens(raw), map=tokenMap(tokens), expected=tokenMap(e.fullTokens); const moeller=e.fullTokens, shell=shellOrderTokens(e.fullTokens); const okMap=mapsEqual(map,expected), okOrder=sameSeq(tokens,moeller)||sameSeq(tokens,shell); addUser(`Configuration: <span class="formula light">${raw}</span>`); const solution=`Moeller/Madelung: ${fullHTML(e)}<br>Shell order: ${shellHTML(e)}`; if(okMap&&okOrder){addBoardResult('Correct configuration',solution,e.isException?e.exceptionNote:''); advanceConfig(3)} else {let hints=configHints(e,okMap); handleWrong('fullconfig',hints,solution,'Configuration',3,e.isException?e.exceptionNote:'')}}
function configHints(e,okMap){return [okMap?'The subshells are correct, but the order is not clearly either the energy order or the shell order.':(state.showZ?`Add up the superscripts: they must equal Z = ${e.z}.`:'Add up the superscripts and check that all subshells correspond to the element.'), e.isException?'Possible s/d exception: in some transition metals, the energy separation between ns and (n−1)d is small.':'Remember Aufbau: 4s before 3d, 5s before 4d, 6s before 4f and 5d.']}
function htmlShortConfig(){return `<h3>4. Write the noble-gas shorthand configuration</h3><textarea id="shortInput" oninput="formatElectronInput(this)"></textarea><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkShortConfig()">Check shorthand</button></div><div id="stepFeedback"></div>`}
function checkShortConfig(){const e=state.el; const raw=$('shortInput').value.trim(); if(!raw) return warnMissing(); addUser(`Shorthand: <span class="formula light">${raw}</span>`); const solution=shortHTML(e); let coreOk=true, tokens=parseTokens(raw); if(e.core) coreOk=new RegExp('\['+e.core+'\]','i').test(normalizeConfig(raw)); const shortMap=tokenMap(tokens), expectedMap=tokenMap(e.shortTokens); const ok=coreOk && mapsEqual(shortMap,expectedMap); if(ok){addBoardResult('Correct shorthand configuration',solution,e.isException?e.exceptionNote:''); advanceConfig(4)} else handleWrong('shortconfig',[e.core?`The preceding noble gas must be [${e.core}].`:'This element has no preceding noble gas in school shorthand notation.', e.isException?'After the noble gas, check the possible s/d exception.':'After the noble gas, write only the remaining subshells.'],solution,'Shorthand configuration',4,e.isException?e.exceptionNote:'')}
function htmlValence(){return `<h3>5. Valence shell and valence electrons</h3><div class="grid3"><div><label>Valence shell</label><input id="valShell" type="number" min="1" max="7"></div><div><label>Occupied valence subshells</label><input id="valTokens" type="text" oninput="formatElectronInput(this)"><p class="small">Write shell + subshell + electrons: writing only s, p or d is not enough.</p></div><div><label>Valence electrons</label><input id="valElectrons" type="number" min="0" max="8"></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkValence()">Check valence</button></div><div id="stepFeedback"></div>`}
function checkValence(){const e=state.el; const shv=$('valShell').value, valRaw=$('valTokens').value.trim(), nev=$('valElectrons').value; if(!shv||nev===''||(e.valenceTokens.length && !valRaw)) return warnMissing(); const shell=Number(shv), toks=parseTokens(valRaw), ne=Number(nev); addUser(`Valence: n=${shell}, subshells ${valRaw||'none'}, electrons ${ne}.`); const emptyOk=!e.valenceTokens.length && ['','none','ninguna','ninguno','no electrons','sin electrons','no ns electrons','0','zero','cero'].includes(normalizeAnswer(valRaw)); const valOk=e.valenceTokens.length?mapsEqual(tokenMap(toks),tokenMap(e.valenceTokens)):emptyOk; const solution=`n = ${e.valenceShell} · ${e.valenceTokens.length?tokensToHTML(e.valenceTokens):'no ns electrons'} · ${e.valenceElectrons} e⁻`; if(shell===e.valenceShell && valOk && ne===e.valenceElectrons){addBoardResult('Correct valence',solution); advanceConfig(5)} else handleWrong('valence',valenceHints(e,valRaw),solution,'Valence',5)}
function valenceHints(e,raw){return [/^[spdf]$/i.test(raw.trim())?'Writing only the subshell letter is not enough: write the full subshell, for example 5s¹.':'The valence shell is the one with the highest principal quantum number n.', 'In transition elements, this platform asks only for occupied outer ns subshells as valence here; the inner d subshell is handled later as an active orbital. If there are no ns electrons, write 0 electrons and no ns subshell.']}

function orbitalDegenerateLabel(level,orbital,i){
  const labels={
    s:['s'],
    p:['p<sub>x</sub>','p<sub>y</sub>','p<sub>z</sub>'],
    d:['d<sub>xy</sub>','d<sub>yz</sub>','d<sub>zx</sub>','d<sub>x²−y²</sub>','d<sub>z²</sub>'],
    f:['f<sub>z³</sub>','f<sub>xz²</sub>','f<sub>yz²</sub>','f<sub>z(x²−y²)</sub>','f<sub>xyz</sub>','f<sub>x(x²−3y²)</sub>','f<sub>y(3x²−y²)</sub>']
  };
  const lab=(labels[orbital]&&labels[orbital][i])?labels[orbital][i]:`${orbital}${i+1}`;
  return `${level}${lab}`;
}

function expectedOccupancies(token){const t=parseToken(token); if(!t) return []; const boxes={s:1,p:3,d:5,f:7}[t.orbital]; const arr=new Array(boxes).fill(0); let e=t.electrons; for(let i=0;i<boxes&&e>0;i++,e--) arr[i]=1; for(let i=0;i<boxes&&e>0;i++,e--) arr[i]=2; return arr}
function htmlOrbitalDeployment(){const e=state.el; const rows=e.activeTokens.map((t,idx)=>{const pt=parseToken(t); const boxes={s:1,p:3,d:5,f:7}[pt.orbital]; let inputs=''; for(let i=0;i<boxes;i++) inputs+=`<div class="orb-box"><div class="orb-label">${orbitalDegenerateLabel(pt.level,pt.orbital,i)}</div><input id="orb_${idx}_${i}" type="number" min="0" max="2" step="1" style="text-align:center"></div>`; return `<div style="margin-bottom:12px"><b>${tokenToHTML(t)}</b><div class="box-row" style="margin-top:6px">${inputs}</div></div>`}).join(''); return `<h3>6. Determining the number of unpaired electrons</h3><h4>a) Expand the energy-degenerate orbitals of the active subshells</h4><p class="small">Write 0, 1 or 2 electrons in each box applying Hund: degenerate orbitals are occupied singly first and paired afterwards.</p>${rows}<div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkOrbitalDeployment()">Check orbitals</button></div><div id="stepFeedback"></div>`}
function checkOrbitalDeployment(){const e=state.el; let allFilled=true, ok=true, shown=[]; e.activeTokens.forEach((t,idx)=>{const exp=expectedOccupancies(t); const vals=exp.map((_,i)=>{const v=$(`orb_${idx}_${i}`).value; if(v==='') allFilled=false; return Number(v)}); if([...vals].sort().join(',')!==[...exp].sort().join(',')) ok=false; shown.push(`${tokenToHTML(t)}: ${vals.map(v=>v===2?'↑↓':v===1?'↑':'_').join(' | ')}`)}); if(!allFilled) return warnMissing(); addUser(`Orbitals: ${shown.join(' ; ')}`); const solution=e.activeTokens.map(t=>`${tokenToHTML(t)}: ${expectedOccupancies(t).map(v=>v===2?'↑↓':v===1?'↑':'_').join(' | ')}`).join('<br>'); if(ok){addBoardResult('Correct active orbitals',solution); advanceConfig(6)} else handleWrong('orbitals',['Hund: before pairing, place one electron in each available degenerate orbital.','Pauli: each box can hold at most two electrons with opposite spins.'],solution,'Active orbitals',6)}
function unpairedCount(e){let total=0; e.activeTokens.forEach(t=>expectedOccupancies(t).forEach(v=>{if(v===1) total++})); return total}
function htmlUnpaired(){return `<h3>7. Deduce the number of unpaired electrons</h3><div><label>Number of unpaired electrons</label><input id="unpairedInput" type="number" min="0" max="20"></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkUnpaired()">Check unpaired electrons</button></div><div id="stepFeedback"></div>`}
function checkUnpaired(){const e=state.el; const v=$('unpairedInput').value; if(v==='') return warnMissing(); const n=Number(v), sol=unpairedCount(e); addUser(`Unpaired electrons: ${n}.`); if(n===sol){addBoardResult('Correct unpaired electrons',`${sol}`); advanceConfig(7)} else handleWrong('unpaired',['Count the boxes with a single electron, not the boxes with a pair.','Degenerate orbitals are filled singly before pairing according to Hund.'],`${sol}`,'Unpaired electrons',7)}
function htmlConfigReport(){const e=state.el; return `<h3>Case summary</h3><p><b>${e.name}</b>${state.showZ?` · Z = ${e.z}`:''}</p><p>Position: <span class="result-inline">period ${e.period} · group ${e.groupId} · block ${e.block}</span></p><p>Ending: <span class="result-inline">${tokenToHTML(finalToken(e))}</span></p><p>Full configuration: <span class="result-inline">${fullHTML(e)}</span></p><p>Shorthand: <span class="result-inline">${shortHTML(e)}</span></p><p>Valence: <span class="result-inline">n = ${e.valenceShell} · ${e.valenceTokens.length?tokensToHTML(e.valenceTokens):'no ns electrons'} · ${e.valenceElectrons} e⁻</span></p><p>Active orbitals: <span class="result-inline">${e.activeTokens.map(t=>tokenToHTML(t)).join(' + ')}</span></p><p>Unpaired electrons: <span class="result-inline">${unpairedCount(e)}</span></p><div class="btn-row"><button class="primary" onclick="startConfig(randomElement(),false)">Another random without Z</button><button class="warn" onclick="startConfig(randomElement(),true)">Another random with Z</button><button class="blue" onclick="showElementPicker()">All elements</button></div>`}
function advanceConfig(step){setTimeout(()=>{state.step=step; state.hints={}; renderConfigStep()},350)}
function handleWrong(key,hints,solutionHtml,label,nextStep,note=''){state.hints[key]=(state.hints[key]||0)+1; const n=state.hints[key]; if(n<=2){addTutor(`<b>Attempt ${n}/3.</b> <b>Hint ${n}/2:</b> ${hints[n-1]||hints[0]}`)} else {addTutor(`Third attempt: correct solution for ${label.toLowerCase()}: <span class="result-inline">${solutionHtml}</span>${note?`<br>${note}`:''}`); addBoardResult(`${label} correcta`,solutionHtml,note,false); setTimeout(()=>{state.step=nextStep; state.hints={}; renderConfigStep()},700)}}

const Q_EXERCISES=[{"id":"l_values","title":"Allowed l values","question":"For each value of n, write all allowed values of l. Separate the values with commas or spaces.","fields":[{"id":"a","label":"a) n = 1","kind":"numlist","expected":[0]},{"id":"b","label":"b) n = 5","kind":"numlist","expected":[0,1,2,3,4]}],"hints":["Rule: for a principal level n, l can take integer values from 0 to n−1.","For n = 1, l can only be 0; for n = 5, l goes up to 4."],"solution":"Correct answers:<br><b>a) n = 1</b>: 0<br><b>b) n = 5</b>: 0, 1, 2, 3, 4","typeKey":"basicos"},{"id":"ml_values","title":"Allowed mₗ values","question":"For each value of l, write all allowed values of mₗ. Separate the values with commas or spaces.","fields":[{"id":"a","label":"a) l = 0","kind":"numlist","expected":[0]},{"id":"b","label":"b) l = 4","kind":"numlist","expected":[-4,-3,-2,-1,0,1,2,3,4]}],"hints":["Rule: for a subshell with quantum number l, mₗ takes integer values from −l to +l.","If l = 0, only mₗ = 0 exists; if l = 4, mₗ goes from −4 to +4."],"solution":"Correct answers:<br><b>a) l = 0</b>: 0<br><b>b) l = 4</b>: −4, −3, −2, −1, 0, +1, +2, +3, +4","typeKey":"basicos"},{"id":"l_values_more","title":"More allowed l values","question":"For each value of n, write all allowed values of l. Separate the values with commas or spaces.","fields":[{"id":"n2","label":"a) n = 2","kind":"numlist","expected":[0,1]},{"id":"n4","label":"b) n = 4","kind":"numlist","expected":[0,1,2,3]},{"id":"n6","label":"c) n = 6","kind":"numlist","expected":[0,1,2,3,4,5]}],"hints":["Rule: for a principal level n, l can take integer values from 0 to n−1.","This exercise does not ask possible/impossible: only write the list of allowed values."],"solution":"Correct answers:<br><b>a) n = 2</b>: 0, 1<br><b>b) n = 4</b>: 0, 1, 2, 3<br><b>c) n = 6</b>: 0, 1, 2, 3, 4, 5","typeKey":"basicos"},{"id":"ml_values_d_f","title":"mₗ values in d and f subshells","question":"Write all possible mₗ values for the indicated subshells.","fields":[{"id":"d","label":"a) l = 2 (subshell d)","kind":"numlist","expected":[-2,-1,0,1,2]},{"id":"f","label":"b) l = 3 (subshell f)","kind":"numlist","expected":[-3,-2,-1,0,1,2,3]}],"hints":["Rule: for a subshell with quantum number l, mₗ takes integer values from −l to +l.","In the usual subshell notation, d corresponds to l = 2 and f corresponds to l = 3."],"solution":"Correct answers:<br><b>a) l = 2 (subshell d)</b>: −2, −1, 0, +1, +2<br><b>b) l = 3 (subshell f)</b>: −3, −2, −1, 0, +1, +2, +3","typeKey":"basicos"},{"id":"letters_to_l","title":"Subshell letter and l value","question":"Write the l value that corresponds to each subshell letter.","fields":[{"id":"s","label":"s","kind":"number","expected":0},{"id":"p","label":"p","kind":"number","expected":1},{"id":"d","label":"d","kind":"number","expected":2},{"id":"f","label":"f","kind":"number","expected":3}],"hints":["Usual order: s, p, d, f.","The values start at 0: s = 0."],"solution":"Correct answers:<br><b>s</b>: 0<br><b>p</b>: 1<br><b>d</b>: 2<br><b>f</b>: 3","typeKey":"basicos"},{"id":"sublevel_names_more","title":"Subshell name","question":"Write the subshell name from n and l.","fields":[{"id":"a","label":"a) n=3, l=0","kind":"text","expected":["3s"]},{"id":"b","label":"b) n=5, l=1","kind":"text","expected":["5p"]},{"id":"c","label":"c) n=4, l=2","kind":"text","expected":["4d"]},{"id":"d","label":"d) n=6, l=3","kind":"text","expected":["6f"]}],"hints":["Keep the principal number n and convert l into a letter.","0 = s, 1 = p, 2 = d, 3 = f."],"solution":"Correct answers:<br><b>a) n=3, l=0</b>: 3s<br><b>b) n=5, l=1</b>: 5p<br><b>c) n=4, l=2</b>: 4d<br><b>d) n=6, l=3</b>: 6f","typeKey":"basicos"},{"id":"max_e_sublevels","title":"Maximum capacity of subshells","question":"Write the maximum number of electrons that each subshell can hold.","fields":[{"id":"s","label":"a) subshell s","kind":"number","expected":2},{"id":"p","label":"b) subshell p","kind":"number","expected":6},{"id":"d","label":"c) subshell d","kind":"number","expected":10},{"id":"f","label":"d) subshell f","kind":"number","expected":14}],"hints":["Each orbital can hold 2 electrons according to Pauli’s exclusion principle.","s, p, d and f contain 1, 3, 5 and 7 orbitals respectively. Multiply by 2."],"solution":"Correct answers:<br><b>a) subshell s</b>: 2 e⁻<br><b>b) subshell p</b>: 6 e⁻<br><b>c) subshell d</b>: 10 e⁻<br><b>d) subshell f</b>: 14 e⁻","typeKey":"basicos"},{"id":"orbitals_per_sublevel","title":"Number of orbitals per subshell","question":"Write how many orbitals there are in each subshell.","fields":[{"id":"s","label":"s","kind":"number","expected":1},{"id":"p","label":"p","kind":"number","expected":3},{"id":"d","label":"d","kind":"number","expected":5},{"id":"f","label":"f","kind":"number","expected":7}],"hints":["The number of orbitals in a subshell is 2l+1.","It also matches the number of possible mₗ values."],"solution":"Correct answers:<br><b>s</b>: 1 orbital<br><b>p</b>: 3 orbitals<br><b>d</b>: 5 orbitals<br><b>f</b>: 7 orbitals","typeKey":"basicos"},{"id":"level_orbitals","title":"Total orbitals in a principal level","question":"Calculate the total number of orbitals in each principal level.","fields":[{"id":"n2","label":"a) n = 2","kind":"number","expected":4},{"id":"n3","label":"b) n = 3","kind":"number","expected":9},{"id":"n4","label":"c) n = 4","kind":"number","expected":16}],"hints":["A principal level n contains n² orbitals.","This is not the number of electrons: count orbitals only."],"solution":"Correct answers:<br><b>n = 2</b>: 4 orbitals<br><b>n = 3</b>: 9 orbitals<br><b>n = 4</b>: 16 orbitals","typeKey":"basicos"},{"id":"level_e_capacity","title":"Electron capacity of a principal level","question":"Write the maximum number of electrons that each principal level can hold.","fields":[{"id":"n1","label":"a) n = 1","kind":"number","expected":2},{"id":"n2","label":"b) n = 2","kind":"number","expected":8},{"id":"n3","label":"c) n = 3","kind":"number","expected":18},{"id":"n4","label":"d) n = 4","kind":"number","expected":32}],"hints":["A level contains n² orbitals and each orbital can hold 2 electrons.","Maximum capacity of the level: 2n²."],"solution":"Correct answers:<br><b>n = 1</b>: 2 e⁻<br><b>n = 2</b>: 8 e⁻<br><b>n = 3</b>: 18 e⁻<br><b>n = 4</b>: 32 e⁻","typeKey":"basicos"},{"id":"sublevels_level4","title":"Subshells for n = 4","question":"For n = 4: a) write all allowed l values; b) in increasing l order, write the full corresponding subshells as n + letter.","fields":[{"id":"l","label":"a) Allowed l values","kind":"numlist","expected":[0,1,2,3]},{"id":"sub1","label":"b1) 1st full orbital/subshell (n + letter)","kind":"text","expected":["4s"]},{"id":"sub2","label":"b2) 2nd full orbital/subshell (n + letter)","kind":"text","expected":["4p"]},{"id":"sub3","label":"b3) 3rd full orbital/subshell (n + letter)","kind":"text","expected":["4d"]},{"id":"sub4","label":"b4) 4th full orbital/subshell (n + letter)","kind":"text","expected":["4f"]}],"hints":["Rule: for a principal level n, l can take integer values from 0 to n−1.","Letter-l relationship: l = 0 → s, l = 1 → p, l = 2 → d, l = 3 → f."],"solution":"Correct answers:<br><b>a) Allowed l values</b>: 0, 1, 2, 3<br><b>b1)</b>: 4s<br><b>b2)</b>: 4p<br><b>b3)</b>: 4d<br><b>b4)</b>: 4f","typeKey":"basicos"},{"id":"ml_count_formula","title":"Number of mₗ values","question":"Write how many different mₗ values each l value has.","fields":[{"id":"l0","label":"a) l = 0","kind":"number","expected":1},{"id":"l1","label":"b) l = 1","kind":"number","expected":3},{"id":"l2","label":"c) l = 2","kind":"number","expected":5},{"id":"l3","label":"d) l = 3","kind":"number","expected":7}],"hints":["mₗ takes values from −l to +l.","Number of values: 2l+1."],"solution":"Correct answers:<br><b>l = 0</b>: 1<br><b>l = 1</b>: 3<br><b>l = 2</b>: 5<br><b>l = 3</b>: 7","typeKey":"basicos"},{"id":"sublevels_exist","title":"Does this subshell exist?","question":"For each subshell, choose possible/impossible. If it exists, write function openQuantumModule(){
  clearAll();
  state.module='quantum';
  $('stageTitle').textContent='Quantum numbers';
  setTopButtons(`${homeButton()}<button class="primary" onclick="newQuantumExercise()">New exercise</button><button class="ghost" onclick="restartQuantumExercise()">Restart</button>`);
  setPrompt(`<div class="mini-title">Quantum numbers</div><div class="mini-sub">${Q_EXERCISES.length} corrected exercises: n · l · mₗ · mₛ · orbitals · Pauli/Hund.</div>`,'prompt-card home quantum-intro');
  addTutor(`Quantum numbers module: ${Q_EXERCISES.length} exercises, with corrected possible/impossible sets.`);
  newQuantumExercise(false);
}
function newQuantumExercise(reset=true){
  if(reset) resetTutor();
  state.hints={};
  state.q=Q_EXERCISES[Math.floor(Math.random()*Q_EXERCISES.length)];
  renderQuantumExercise();
  addTutor('Solve the exercise. In boxes with several values, separate them with commas or spaces; the + sign is optional. Rules: l = 0…n−1; mₗ = −l…+l; mₛ = ±1/2.');
}
function restartQuantumExercise(){
  if(state.q){
    state.hints={};
    resetTutor();
    renderQuantumExercise();
    addTutor('Restarting the same exercise.');
  } else {
    newQuantumExercise();
  }
}
function renderQuantumExercise(){
  const q=state.q;
  if(!q) return;
  $('stageTitle').textContent='Quantum numbers';
  const fieldsHTML=q.fields.map(f=>`
    <div class="q-field">
      <label>${formatQuantumSymbolsInHTML(escapeHtml(f.label))}</label>
      ${quantumFieldInputHTML(f)}
    </div>`).join('');
  setPrompt(`<div class="mini-title">Quantum numbers</div><div class="mini-sub">${Q_EXERCISES.length} corrected exercises: n · l · mₗ · mₛ · orbitals · Pauli/Hund.</div>`, 'prompt-card home compact-intro quantum-intro');
  setWork(`<div class="quantum-work">
    <h3>${escapeHtml(q.title)}</h3>
    <p class="q-question">${formatQuantumSymbolsInHTML(escapeHtml(q.question))}</p>
    ${quantumHelp(q)}
    <div class="q-grid ${q.fields.length>6?'many':''}">${fieldsHTML}</div>
    <div class="btn-row quantum-actions"><button class="good" onclick="checkQuantumExercise()">Check</button><button class="primary" onclick="newQuantumExercise()">Another exercise</button></div>
    <div id="stepFeedback"></div>
  </div>`);
}

function parseNums(s){const txt=String(s||'').replace(/[−–—]/g,'-').replace(/\+/g,'+');const out=[];const re=/[+-]?\d+(?:\.\d+)?(?:\s*\/\s*[+-]?\d+(?:\.\d+)?)?/g;let m;while((m=re.exec(txt))!==null){const tok=m[0].replace(/\s+/g,'');let v;if(tok.includes('/')){const [a,b]=tok.split('/').map(Number);if(Number.isNaN(a)||Number.isNaN(b)||b===0)continue;v=a/b;}else{v=Number(tok);}if(!Number.isNaN(v))out.push(v);}return out;}
function valuesFromText(s){return parseNums(s)}
function sameNumSet(input,expected){const a=valuesFromText(input).sort((x,y)=>x-y),b=[...expected].sort((x,y)=>x-y);return a.length===b.length&&a.every((x,i)=>x===b[i])}
function checkSpinPairAnswer(val){const raw=normalizeAnswer(val);if(['opposite','opuesto','antiparalelos','antiparalelo','contrarios','contrario','ms opposite','mₛ opposite','+1/2 and -1/2','-1/2 and +1/2','1/2 and -1/2','-1/2 and 1/2'].includes(raw))return true;const s=normalizeText(val).replace(/[−–—]/g,'-').replace(/\+/g,'').replace(/mₛ|ms/g,'').replace(/[()]/g,' ').replace(/,/g,' ').replace(/;/g,' ').replace(/y/g,' ').replace(/\s+/g,' ').trim();const vals=[];const re=/-?\s*1\s*\/\s*2/g;let m;while((m=re.exec(s))!==null){vals.push(m[0].replace(/\s+/g,''));}if(vals.length!==2)return false;const nums=vals.map(x=>x.startsWith('-')?-0.5:0.5);return nums.includes(0.5)&&nums.includes(-0.5);}
function boxAnswerEquivalentToExpectedAny(raw, expectedList){
  if(!/[↑↓|_]/.test(String(raw||''))) return false;
  const got=parseBoxParts(raw);
  if(!got || got.some(p=>!p.ok)) return false;
  const gotCounts=got.map(p=>p.count).sort((a,b)=>b-a);
  const gotSingles=got.filter(p=>p.count===1).map(p=>p.single);
  if(gotSingles.length>1 && !gotSingles.every(x=>x===gotSingles[0])) return false;
  return (expectedList||[]).some(exp=>{
    if(!/[↑↓|_]/.test(String(exp||''))) return false;
    const e=parseBoxParts(exp);
    if(!e || e.some(p=>!p.ok) || e.length!==got.length) return false;
    const expCounts=e.map(p=>p.count).sort((a,b)=>b-a);
    return gotCounts.length===expCounts.length && gotCounts.every((v,i)=>v===expCounts[i]);
  });
}
function tupleTextEquivalentToExpectedAny(raw, expectedList){
  const got=parseNums(raw);
  if(!got || got.length<4) return false;
  return (expectedList||[]).some(exp=>{
    const e=parseNums(exp);
    if(!e || e.length!==got.length || e.length<4) return false;
    return e.every((v,i)=>v===got[i]);
  });
}
function checkField(f,val){if(f.kind==='numlist')return sameNumSet(val,f.expected);if(f.kind==='number')return Number(normalizeText(val).replace(',','.').replace(/^\+/,''))===f.expected;if(f.kind==='spinpair')return checkSpinPairAnswer(val);if(f.kind==='text'||f.kind==='choice'){const expectedOk=(f.expected||[]).map(normalizeAnswer).includes(normalizeAnswer(val));if(expectedOk)return true;if(tupleTextEquivalentToExpectedAny(val,f.expected||[]))return true;if(boxAnswerEquivalentToExpectedAny(val,f.expected||[]))return true;if(f.hundSub&&typeof f.hundElectrons==='number')return boxDiagramOk(val,f.hundSub,f.hundElectrons);return false;}return true}
function quantumPlaceholder(f,q){if(f.kind==='spinpair')return 'relationship between the two spins';if(q.custom==='hund_boxes'&&f.kind==='text')return 'use ↑, ↓, | and _';if(q.custom==='orbitalsets_all')return 'sets separated by ; or line break';if(q.custom==='orbitalsets')return 'n,l,mₗ,mₛ';if(f.kind==='numlist')return 'values separated by spaces';if(f.kind==='number')return 'number';if((f.expected||[]).map(normalizeAnswer).includes('posible')||(f.expected||[]).map(normalizeAnswer).includes('imposible'))return 'possible / impossible';return f.placeholder||'answer'}
function quantumHelp(q){const hasList=q.fields.some(f=>f.kind==='numlist');const hasTuple=q.custom==='orbitalsets';const hasAllTuples=q.custom==='orbitalsets_all';const hasBoxes=q.custom==='hund_boxes';const hasValidity3=q.custom==='quantum_validity_three_fields';const hasFailedDetail=!hasValidity3&&q.fields.some(f=>String(f.id||'').endsWith('_detail')&&/fails|allowed|detail/i.test(String(f.label||'')));const parts=[];if(hasValidity3)parts.push('<b>This exercise has 3 boxes per set:</b> 1) possible/impossible; 2) what fails: l, mₗ, mₛ or none; 3) if it fails, allowed values; if possible, orbital.');if(hasFailedDetail)parts.push('<b>Possible/impossible:</b> if it is possible, answer <span class="formula light">none</span>; if l, mₗ or mₛ fails, write the corresponding allowed values.');if(hasList)parts.push('<b>Several values:</b> comma or space. <span class="formula light">−1 0 1</span> · <b>+</b> optional');if(hasTuple)parts.push('<b>Set:</b> n,l,mₗ,mₛ in the same box. <span class="formula light">3,0,0,+1/2</span>');if(hasAllTuples)parts.push('<b>All sets:</b> write (n,l,mₗ,mₛ) and separate with ; or a line break. Order does not matter.');if(hasBoxes)parts.push('<b>Boxes:</b> ↑ up · ↓ down · ↑↓ pair · | separates orbitals · _ empty. <b>Keys:</b> copy symbols or use Windows: Alt+24=↑, Alt+25=↓ (numeric keypad); AltGr+1=|, Shift+-=_.');parts.push('<b>Rules:</b> l=0…n−1 · mₗ=−l…+l · mₛ=±1/2');return `<div class="quantum-help">${parts.join(' · ')}</div>`}
function quantumFieldInputHTML(f){if(f.type==='select'){const opts=(f.options||[]).map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');return `<select id="q_${f.id}"><option value="">Select...</option>${opts}</select>`;}if(f.kind==='choice'){return `<select id="q_${f.id}"><option value="">Select...</option><option value="possible">possible</option><option value="impossible">impossible</option></select>`;}if(f.type==='textarea'||qNeedsTextarea(f,state.q)){return `<textarea id="q_${f.id}" class="quantum-long-answer" placeholder="${escapeHtml(f.placeholder||quantumPlaceholder(f,state.q))}"></textarea>`;}return `<input id="q_${f.id}" placeholder="${escapeHtml(f.placeholder||quantumPlaceholder(f,state.q))}">`;}
function qNeedsTextarea(f,q){return q&&q.custom==='orbitalsets_all';}
function isQuantumDetailValuesExercise(q){return q&&(q.custom==='quantum_validity_three_fields'||/^identify_failed_quantum_number_(39|40)_extra_\d+$/.test(q.id));}
function prefixOfQuantumField(f){return String(f.id||'').split('_')[0]}
function quantumTupleForDetail(q,f){if(!isQuantumDetailValuesExercise(q))return null;const fid=String(f.id||'');if(!(fid.endsWith('_detail')||fid.endsWith('_fail')))return null;const pref=prefixOfQuantumField(f);const cf=q.fields.find(x=>x.id===pref+'_class');if(!cf)return null;const m=String(cf.label||'').match(/\(([^)]+)\)/);if(!m)return null;const nums=parseNums(m[1]);return nums.length>=4?nums.slice(0,4):null;}
function quantumOrbitalName(tuple){const letters={0:'s',1:'p',2:'d',3:'f',4:'g',5:'h',6:'i',7:'k',8:'l',9:'m'};if(!tuple)return '';return String(tuple[0])+String(letters[tuple[1]]||'?');}
function quantumOrbitalOk(val,tuple){const orb=quantumOrbitalName(tuple);if(!orb||orb.includes('?'))return false;const n=normalizeAnswer(val).replace(/^(orbital|subshell)\s+/,'');return n===normalizeAnswer(orb);}
function quantumFailInfo(tuple){if(!tuple)return null;const n=tuple[0],l=tuple[1],ml=tuple[2],ms=tuple[3];if(!Number.isInteger(l)||l<0||l>n-1)return {kind:'l',allowed:Array.from({length:Math.max(0,Math.floor(n))},(_,i)=>i)};if(!Number.isInteger(ml)||ml<-l||ml>l)return {kind:'ml',allowed:Array.from({length:2*l+1},(_,i)=>i-l)};if(!(ms===0.5||ms===-0.5))return {kind:'ms',allowed:[0.5,-0.5]};return {kind:'none',allowed:[]};}
function quantumNoneOk(val){return ['none','ninguna','ninguno','does not fail','no falla','correct','correcto','possible','posible','no rule is broken','no se incumple ninguna','no quantity','ninguna magnitud'].includes(normalizeAnswer(val));}
function quantumSymbolOk(val,kind){const n=normalizeAnswer(val);if(kind==='ml')return ['ml','mₗ','m_l','invalid mₗ','mₗ invalid','ml invalid','mₗ invalido','mₗ inválido','ml invalido','ml inválido','mₗ no permitido'].includes(n);if(kind==='ms')return ['ms','mₛ','m_s','spin','espin','espín','invalid mₛ','mₛ invalid','ms invalid','ms invalido','mₛ invalido','mₛ inválido','mₛ no permitido'].includes(n);if(kind==='l')return ['l','invalid l','l invalid','l invalido','l inválido','l no permitido'].includes(n);return false;}
function checkQuantumSpecialDetail(q,f,val){const tuple=quantumTupleForDetail(q,f);if(!tuple)return null;const info=quantumFailInfo(tuple);if(!info)return null;const fid=String(f.id||'');if(fid.endsWith('_fail')){if(info.kind==='none')return quantumNoneOk(val);return quantumSymbolOk(val,info.kind);}if(q&&q.custom==='quantum_validity_three_fields'&&fid.endsWith('_detail')&&info.kind==='none')return quantumOrbitalOk(val,tuple);if(info.kind==='none')return quantumNoneOk(val);if(info.kind==='l')return sameNumSet(val,info.allowed);if(info.kind==='ml')return sameNumSet(val,info.allowed);if(info.kind==='ms')return checkSpinPairAnswer(val)||sameNumSet(val,info.allowed);return null;}

function parseTokensWithCore(raw){
  const str=normalizeConfig(raw||'');
  let toks=[];
  const m=str.match(/\[\s*(he|ne|ar|kr|xe|rn)\s*\]/i);
  if(m) toks=toks.concat(CORE_TOKENS[m[1].toLowerCase()]||[]);
  return toks.concat(parseTokens(str.replace(/\[[^\]]+\]/g,' ')));
}
function configSpdfOk(raw, expectedTokens){return mapsEqual(tokenMap(parseTokensWithCore(raw)), tokenMap(expectedTokens));}
function stripSubshellLabel(raw){return String(raw||'').replace(/^[\s\[]*\d\s*[spdf]\s*[:：=\-]?/i,'').trim();}
function parseBoxParts(raw){
  let txt=stripSubshellLabel(raw).replace(/[;，]/g,'|').replace(/\s*\|\s*/g,'|').trim();
  if(!txt) return null;
  const parts=txt.split('|').map(x=>x.trim()).filter(x=>x.length);
  return parts.map(p=>{
    let q=p.replace(/[\[\]{}()]/g,'').replace(/\s+/g,'');
    if(q===''||q==='_'||q==='–'||q==='-'||q==='0') return {count:0, single:null, ok:true};
    const ups=(q.match(/↑/g)||[]).length, downs=(q.match(/↓/g)||[]).length;
    if(ups+downs===1) return {count:1, single:ups?'up':'down', ok:true};
    if(ups===1 && downs===1 && ups+downs===2) return {count:2, single:null, ok:true};
    return {count:NaN, single:null, ok:false};
  });
}
function hundCounts(nBoxes,e){const arr=Array(nBoxes).fill(0); for(let i=0;i<e;i++){arr[i % nBoxes] += 1;} return arr.sort((a,b)=>b-a);}
function boxDiagramOk(raw, sub, electrons){
  const nBoxes=degeneracyOfSubshellLetter(String(sub).slice(-1));
  const parts=parseBoxParts(raw);
  if(!parts || parts.length!==nBoxes || parts.some(p=>!p.ok)) return false;
  if(parts.reduce((a,p)=>a+p.count,0)!==electrons) return false;
  if(parts.some(p=>p.count>2)) return false;
  const got=parts.map(p=>p.count).sort((a,b)=>b-a), exp=hundCounts(nBoxes,electrons);
  if(got.length!==exp.length || got.some((v,i)=>v!==exp[i])) return false;
  const singles=parts.filter(p=>p.count===1).map(p=>p.single);
  if(singles.length>1 && !singles.every(x=>x===singles[0])) return false;
  return true;
}
function canonicalBoxDiagram(sub,electrons){
  const nBoxes=degeneracyOfSubshellLetter(String(sub).slice(-1));
  const counts=hundCounts(nBoxes,electrons);
  const boxes=counts.map(c=>c===2?'↑↓':c===1?'↑':'_');
  return `${sub}: ${boxes.join(' | ')}`;
}

function tokenSubshellAndElectrons(token){

    $('spdfFeedback').innerHTML=`<div class="feedback good"><b>Correct answer.</b><br><span class="result-inline">${sol}</span></div>`;
    addTutor(`<b>Correct answer.</b><br><span class="result-inline">${sol}</span>`);
  }
  else{
    state.hints.spdfAttempts=(state.hints.spdfAttempts||0)+1;
    const n=state.hints.spdfAttempts;
    const parts=[]; if(!cfgOk) parts.push(`check the electron configuration`); if(!coreOk) parts.push(`check whether you used the correct noble gas`); if(boxBad.length) parts.push(`check ${boxBad.length===1?'one box diagram':'the box diagrams'}: number of boxes, electrons, Hund and Pauli`);

      const hint=n===1?`Add up ${q.z} electrons and check the filling order before writing the boxes.`:(q.note||`In the boxes, apply Hund: unpaired parallel electrons first; then pairing according to Pauli.`);
      $('spdfFeedback').innerHTML=`<div class="feedback bad"><b>Incorrect answer. Attempt ${n}/3.</b> ${parts.join('; ')}.<br><b>Hint ${n}/2:</b> ${hint}</div>`;
      addTutor(`<b>Attempt ${n}/3 incorrect.</b> ${parts.join('; ')}.<br><b>Hint ${n}/2:</b> ${hint}`);

      addTutor(`<b>Third incorrect attempt.</b> ${parts.join('; ')}.<br><span class="result-inline"><b>Correct answer:</b> ${sol}</span>`);

}

function openStateModule(){clearAll(); state.module='state'; $('stageTitle').textContent='States and orbital boxes'; setTopButtons(`${homeButton()}<button class="primary" onclick="newStateExercise()">New exercise</button><button class="ghost" onclick="restartStateExercise()">Restart</button>`); setPrompt('<div class="mini-title">States and orbital boxes</div><div class="mini-sub">Classify as ground state · excited state · incorrect. Justify with Aufbau, Pauli and Hund.</div>','prompt-card home compact-intro'); addTutor('Classification module. Use Aufbau, Pauli and Hund to justify your answer.'); newStateExercise(false)}
function newStateExercise(reset=true){if(reset) resetTutor(); state.hints={}; state.cfgState=STATE_EXERCISES[Math.floor(Math.random()*STATE_EXERCISES.length)]; renderStateExercise(); addTutor('Read the instructions in the orange box. Choose ground state, excited state or incorrect. If it is not ground state, complete the second box with what is requested: ground-state configuration or ground-state subshell diagram.')}
function restartStateExercise(){if(state.cfgState){state.hints={}; resetTutor(); renderStateExercise(); addTutor('Restarting the same exercise.')} else newStateExercise()}
function degeneracyOfSubshellLetter(letter){return {s:1,p:3,d:5,f:7}[String(letter).toLowerCase()]||0}
function tokenKey(t){const m=String(t).match(/^(\d[spdf])\d{1,2}$/i); return m?m[1].toLowerCase():''}
function tokenElectrons(t){const m=String(t).match(/^(\d[spdf])(\d{1,2})$/i); return m?Number(m[2]):0}
function tokenCapacity(t){const m=String(t).match(/^(\d)([spdf])(\d{1,2})$/i); return m?CAPACITY[m[2].toLowerCase()]:0}
function configElectronCount(tokens){return (tokens||[]).reduce((a,t)=>a+tokenElectrons(t),0)}
function renderStateExercise(){
  const q=state.cfgState; const isBoxes=q.type==='boxes';
  const content=isBoxes?`<p>Species: <b>${q.species}</b></p><p>Given classical configuration: <span class="formula light">${configToDisplayHTML(q.config)}</span></p><p>Diagram to classify: <span class="formula light">${diagramToDisplayHTML(q.diagram)}</span></p>`:`<p>Configuration to classify: <span class="formula light">${configToDisplayHTML(q.config)}</span></p>`;
  const rawSub=(isBoxes && (q.diagram.match(/(\d[spdf])\s*:/i)||[])[1]) || '';
  const shownSub=rawSub ? rawSub.toLowerCase() : '';
  const typingGuide=`<span class="small"><b>How to write boxes:</b> ↑ up · ↓ down · ↑↓ pair · | separates orbitals · _ empty orbital. <b>Keys:</b> copy symbols or use Windows: Alt+24=↑, Alt+25=↓ (numeric keypad); AltGr+1=|, Shift+-=_.</span>`;
  const help=isBoxes?`<div class="feedback warn"><b>Answer:</b> classify. If it is not ground state, write <b>only the ground-state diagram for ${shownSub||'subshell'}</b>. ${typingGuide}<br><b>Format:</b> ${shownSub||'2p'}: ↑ | ↑ | _ · <b>Do not use</b> 3d¹ 3d¹..., because it does not indicate spins.</div>`:`<div class="feedback warn"><b>Answer:</b> classify. If it is not ground state, write the <b>full ground-state configuration</b>. You can write <b>1s2 2s2</b> or <b>1s² 2s²</b>.</div>`;
  const label=isBoxes?`Ground-state diagram for ${shownSub||'subshell'}, if applicable. Use ↑, ↓, ↑↓, | and _ (Alt+24/25, AltGr+1)`:'Ground-state electron configuration, if applicable';
  const placeholder=isBoxes?`${shownSub||'2p'}: ↑↓ | ↑ | _`:'1s² 2s² 2p⁶';
  setWork(`<h3>${q.title}</h3>${content}${help}<div class="grid2"><div><label>Classification</label><select id="stateClass"><option value="">Select...</option><option value="fundamental">Ground state</option><option value="excitado">Excited state</option><option value="incorrecto">Incorrect state</option></select></div><div><label class="state-ground-label">${label}</label><input id="groundInput" type="text" placeholder="${placeholder}" oninput="formatElectronInput(this)"></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkStateExercise()">Check</button><button class="primary" onclick="newStateExercise()">Another exercise</button></div><div id="stepFeedback"></div>`);
}
function extractBoxAnswer(raw){
  let s=(raw||'').trim().replace(/;/g,'|').replace(/,/g,'|'); if(!s) return null;
  let label=''; const m=s.match(/(\d[spdf])\s*:/i); if(m){label=m[1].toLowerCase(); s=s.slice(s.indexOf(':')+1)}
  const boxes=s.split('|').map(x=>x.trim()).filter(x=>x.length);
  return boxes.length?{label,boxes}:null;
}
function boxInfo(box){const up=(box.match(/↑/g)||[]).length, down=(box.match(/↓/g)||[]).length; return {up,down,count:up+down}}
function boxesRespectPauli(boxes){return boxes.every(b=>{const x=boxInfo(b); return x.count<=2 && !(x.count===2 && (x.up===2||x.down===2));})}
function boxDistributionIsHund(boxes,e,deg){
  if(boxes.length!==deg || !boxesRespectPauli(boxes)) return false;
  const infos=boxes.map(boxInfo), counts=infos.map(x=>x.count).sort((a,b)=>b-a);
  const pairs=Math.max(0,e-deg), singles=e<=deg?e:deg-pairs, empties=Math.max(0,deg-pairs-singles);
  const expected=[...Array(pairs).fill(2),...Array(singles).fill(1),...Array(empties).fill(0)].sort((a,b)=>b-a);
  if(counts.join(',')!==expected.join(',')) return false;
  const singleSigns=infos.filter(x=>x.count===1).map(x=>x.up?'+':'-');
  return singleSigns.length<=1 || singleSigns.every(s=>s===singleSigns[0]);
}
function groundDiagramSolution(q){
  if(!q || q.type!=='boxes') return ''; const rawShown=(q.diagram.match(/(\d[spdf])\s*:/i)||[])[1]; const shown=rawShown ? rawShown.toLowerCase() : ''; if(!shown) return '';
  const expectedToken=(q.ground||[]).find(t=>tokenKey(t)===shown); if(!expectedToken) return '';
  const e=tokenElectrons(expectedToken), deg=degeneracyOfSubshellLetter(shown.slice(-1)); const boxes=[]; const pairs=Math.max(0,e-deg); const singles=e<=deg?e:deg-pairs;
  for(let i=0;i<deg;i++){if(i<pairs) boxes.push('↑↓'); else if(i<pairs+singles) boxes.push('↑'); else boxes.push('_')}
  return `${shown}: ${boxes.join(' | ')}`;
}
function groundDiagramOk(raw,q){
  if(!q || q.type!=='boxes') return false; const ans=extractBoxAnswer(raw); if(!ans) return false;
  const rawShown=(q.diagram.match(/(\d[spdf])\s*:/i)||[])[1]; const shown=rawShown ? rawShown.toLowerCase() : ''; const key=(ans.label || shown || '').toLowerCase(); if(!key || (shown && key!==shown)) return false;
  const expectedToken=(q.ground||[]).find(t=>tokenKey(t)===key); if(!expectedToken) return false;
  return boxDistributionIsHund(ans.boxes, tokenElectrons(expectedToken), degeneracyOfSubshellLetter(key.slice(-1)));
}
function hasDuplicateTokenKeys(tokens){const seen=new Set(); for(const t of tokens){const k=tokenKey(t); if(seen.has(k)) return true; seen.add(k)} return false}
function groundAnswerOk(raw,q){
  if(q.type==='boxes') return groundDiagramOk(raw,q);
  const tok=parseTokensWithCore(raw); return tok.length && !hasDuplicateTokenKeys(tok) && mapsEqual(tokenMap(tok), tokenMap(q.ground));
}
function stateLabelEN(x){return x==='fundamental'?'ground state':(x==='excitado'?'excited state':(x==='incorrecto'?'incorrect':x));}
function stateExplanation(q){return `Justification: ${htmlifyConfigText(q.reason)}`}
function stateRuleAssessment(q){
  if(!q) return '';
  if(q.state==='fundamental'){
    if(q.type==='boxes') return ' Electron-filling rules: it follows Aufbau because the starting configuration corresponds to the ground-state filling of the element; it follows Pauli because no orbital exceeds two electrons and electron pairs have opposite spins; and it follows Hund because the degenerate orbitals of the shown subshell are first occupied singly with parallel spins before pairing.';
    return ' Electron-filling rules: it follows Aufbau because subshells are occupied in the expected energy order; it follows Pauli because no subshell/orbital exceeds its maximum capacity; and, when represented as orbital boxes, it follows Hund because electrons in degenerate subshells are distributed singly with parallel spins before pairing.';
  }
  if(q.state==='incorrecto'){
    if(q.type==='config'){
      const bad=(parseTokens(q.config)||[]).find(t=>tokenElectrons(t)>tokenCapacity(t));
      if(bad){
        const key=tokenKey(bad), letter=key.slice(-1), cap=CAPACITY[letter];
        const label=letter==='s'?'an s subshell/s orbital':`a ${letter} subshell`;
        return ` Rule not fulfilled: Pauli exclusion principle/maximum capacity; ${label} can hold at most ${cap} electrons.`;
      }
      return ' Rule not fulfilled: there is excess capacity in an orbital or subshell, so Pauli is violated.';
    }
    if((q.diagram||'').includes('↑↓↑')) return ' Rule not fulfilled: Pauli exclusion principle, because the same orbital contains three electrons.';
    if((q.diagram||'').includes('↑↑')) return ' Rule not fulfilled: Pauli exclusion principle, because two electrons in the same orbital have the same spin.';
    return ' Rule not fulfilled: Pauli exclusion principle.';
  }
  if(q.state==='excitado'){
    if(q.type==='boxes') return ' Rule not corresponding to the ground state: Hund; Pauli is fulfilled, but unpaired occupation with parallel spins before pairing is not maximised.';
    if((q.reason||'').toLowerCase().includes('exception')) return ' Affected rule/criterion: s/d stability exception; this is not a Pauli or capacity violation, but the given configuration is not the most stable ground-state configuration.';
    return ' Rule not corresponding to the ground state: Aufbau/energy order; electrons have been promoted to higher-energy subshells before the expected ground-state distribution.';
  }
  return '';
}
function specificStateHint(q,raw){
  if(q && q.type==='boxes' && raw){const tok=parseTokens(raw); if(tok.length && mapsEqual(tokenMap(tok), tokenMap(q.ground))) return 'This activity assesses the orbital diagram: the classical configuration is not enough to check Hund or Pauli. Write the subshell with arrows, for example 2p: ↑ | ↑ | _.'; if(tok.length && hasDuplicateTokenKeys(tok)) return 'Writing 2p¹ 2p¹ or 3d¹ 3d¹ separates electrons, but does not show whether their spins are parallel or opposite. Use arrows and bars.'; if(raw.includes('|') && !groundDiagramOk(raw,q)) return 'Check the diagram: each orbital holds at most two electrons with opposite spins, and Hund requires degenerate orbitals to be singly occupied before pairing.'}
  return '';
}
function checkStateExercise(){
  const q=state.cfgState; const cls=$('stateClass').value; if(!cls) return warnMissing();
  const raw=$('groundInput').value.trim(); if(cls!=='fundamental' && !raw) return warnMissing();

  if(classOk && groundOk){setWork(`<h3>${q.title}</h3><div class="board-result"><b>Correct answer:</b> <span class="result-inline">${solution}</span></div><div class="btn-row" style="margin-top:8px"><button class="primary" onclick="newStateExercise()">New exercise</button><button class="ghost" onclick="restartStateExercise()">Restart</button></div>`); addTutor('Correct: the classification and correction are well stated. The detailed explanation remains in the exercise panel.')} else handleWrongState(q,solution,raw);
}
function handleWrongState(q,solution,raw=''){state.hints.state=(state.hints.state||0)+1; const n=state.hints.state; if(n<=2){const extra=specificStateHint(q,raw); addTutor(`<b>Attempt ${n}/3.</b> <b>Hint ${n}/2:</b> ${htmlifyConfigText(extra || q.hints[n-1] || q.hints[0])}`)} else {addTutor(`Third attempt: <span class="result-inline">${solution}</span>`); setWork(`<h3>${q.title}</h3><div class="board-result"><b>Correct solution:</b> <span class="result-inline">${solution}</span></div><div class="btn-row" style="margin-top:8px"><button class="primary" onclick="newStateExercise()">New exercise</button><button class="ghost" onclick="restartStateExercise()">Restart</button></div>`)}}
